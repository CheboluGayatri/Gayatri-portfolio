<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gayatri-Portfolio</title>
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '10px';
        errDiv.style.left = '10px';
        errDiv.style.right = '10px';
        errDiv.style.backgroundColor = 'rgba(254, 226, 226, 0.95)';
        errDiv.style.color = '#b91c1c';
        errDiv.style.border = '2px solid #ef4444';
        errDiv.style.padding = '15px';
        errDiv.style.borderRadius = '8px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '14px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.innerHTML = '<strong>Client-Side Error Captured:</strong><br/>' + e.message + '<br/><br/><strong>Source:</strong> ' + e.filename + ':' + e.lineno + ':' + e.colno + '<br/><br/><strong>Stack Trace:</strong><br/>' + (e.error ? e.error.stack : 'N/A');
        (document.body || document.documentElement).appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '10px';
        errDiv.style.left = '10px';
        errDiv.style.right = '10px';
        errDiv.style.backgroundColor = 'rgba(254, 226, 226, 0.95)';
        errDiv.style.color = '#b91c1c';
        errDiv.style.border = '2px solid #ef4444';
        errDiv.style.padding = '15px';
        errDiv.style.borderRadius = '8px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '14px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.innerHTML = '<strong>Unhandled Rejection Captured:</strong><br/>' + e.reason;
        (document.body || document.documentElement).appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
